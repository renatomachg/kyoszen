<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;0,900;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F8FAFC;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Bloque azul lateral izquierdo */
  .side-bar {
    position: absolute;
    left: 0; top: 0;
    width: 14px;
    height: 100%;
    background: #1883FF;
  }

  /* Bloque navy inferior */
  .bottom-block {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
    background: #042E7B;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px 0 74px;
  }

  .bottom-cta {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
  }

  .bottom-logo {
    height: 54px;
    filter: brightness(0) invert(1);
  }

  /* Contenido principal */
  .main {
    padding: 64px 60px 200px 74px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 72px;
  }

  .badge {
    background: #10B981;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 999px;
  }

  .tag-line {
    font-size: 18px;
    font-weight: 500;
    color: #64748B;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Headline editorial gigante */
  .headline {
    font-size: 100px;
    font-weight: 900;
    color: #042E7B;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 48px;
    max-width: 900px;
  }

  .headline span {
    color: #1883FF;
  }

  /* Línea divisora */
  .divider {
    width: 80px;
    height: 6px;
    background: #10B981;
    border-radius: 999px;
    margin-bottom: 40px;
  }

  /* Subtexto */
  .body-text {
    font-size: 26px;
    font-weight: 400;
    color: #0F172A;
    line-height: 1.5;
    max-width: 680px;
  }

  .services {
    display: flex;
    gap: 24px;
    margin-top: 32px;
  }

  .service-pill {
    background: #E3F2FF;
    color: #042E7B;
    font-size: 18px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 999px;
  }
</style>
</head>
