/* Bloque verde pequeño acento */
.green-dot { position:absolute; top:60px; right:60px; width:24px; height:24px; background:#10B981; border-radius:50%; }

/* Línea top */
.top-line { position:absolute; top:0; left:0; right:0; height:8px; background:#042E7B; }

/* Contenido */
.content { position:absolute; top:0; left:0; right:0; padding:60px 64px; display:flex; flex-direction:column; gap:0; }
.logo { height:52px; margin-bottom:52px; }
.badge-row { display:flex; align-items:center; gap:16px; margin-bottom:36px; }
.badge { background:#E3F2FF; color:#042E7B; font-size:17px; font-weight:600; padding:8px 20px; border-radius:999px; }
.headline { font-size:92px; font-weight:900; color:#042E7B; line-height:0.92; letter-spacing:-0.04em; margin-bottom:36px; max-width:760px; }
.headline span { color:#1883FF; }

.bullets { display:flex; flex-direction:column; gap:16px; margin-bottom:44px; }
.bullet { display:flex; align-items:center; gap:18px; }
.num { min-width:40px; height:40px; background:#042E7B; color:#fff; font-size:16px; font-weight:700; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.bullet-text { font-size:22px; font-weight:500; color:#0F172A; }

.cta { display:inline-flex; align-items:center; gap:14px; background:#10B981; color:#fff; font-size:20px; font-weight:700; padding:16px 28px 16px 36px; border-radius:999px; width:fit-content; }
.arrow-circle { background:rgba(255,255,255,0.25); width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; }

.url { position:absolute; bottom:48px; left:64px; font-size:16px; color:#CBD5E1; letter-spacing:0.05em; }
