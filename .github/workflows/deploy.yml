name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.111.112
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/kyoszen
            git pull
            npm install
            npm run build
            pm2 restart kyoszen
